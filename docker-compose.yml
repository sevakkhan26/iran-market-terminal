# Iran Market Terminal — local + production stack (app + PostgreSQL).
#
# First time / after git pull:
#   cp .env.example .env          # optional: fill AUTH_*
#   docker compose up -d --build
#
# App runs migrations automatically on start (alembic upgrade head).
# Postgres data persists in the `pgdata` volume.
#
#   docker compose logs -f terminal
#   docker compose ps             # both services should be healthy/up
#   docker compose down           # stop (data kept)
#   docker compose down -v        # stop AND wipe database volume

services:
  db:
    image: postgres:16-alpine
    container_name: iran-market-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-terminal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terminal}
      POSTGRES_DB: ${POSTGRES_DB:-terminal}
    ports:
      # Host port (container always 5432). Default 5433 avoids clashing with
      # another local Postgres (e.g. OTC desk on 5432).
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-terminal} -d ${POSTGRES_DB:-terminal}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  terminal:
    # Prefer offline-friendly build: host runs ./scripts/prepare-offline-build.sh
    # (downloads wheels + builds frontend) then: docker compose build
    build:
      context: .
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
    image: iran-market-terminal:latest
    container_name: iran-market-terminal
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Explicit DNS — same pattern that fixed IR exchange connectivity
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 9.9.9.9
      - 178.22.122.100
    ports:
      - "${PORT:-4000}:4000"
    environment:
      HOST: "0.0.0.0"
      PORT: "4000"
      RUN_COLLECTOR: "1"
      DEMO_MODE: "${DEMO_MODE:-}"
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD_HASH: "${AUTH_PASSWORD_HASH:-}"
      AUTH_TOKEN_SECRET: "${AUTH_TOKEN_SECRET:-}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      # All persistence → Postgres (no SQLite / settings.json)
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-terminal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terminal}
      POSTGRES_DB: ${POSTGRES_DB:-terminal}
      DATABASE_URL: postgresql://${POSTGRES_USER:-terminal}:${POSTGRES_PASSWORD:-terminal}@db:5432/${POSTGRES_DB:-terminal}
      PG_POOL_MAX: "${PG_POOL_MAX:-16}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/api/health', timeout=6).status==200 else 1)"]
      interval: 30s
      timeout: 8s
      start_period: 120s
      retries: 5

volumes:
  pgdata:
